<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>My Cart</title>

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>

<body>

    <header class="navbar">

        <a
            href="index.html"
            class="logo-link"
        >
            MyStore
        </a>

        <h2 class="cart-title">
            Shopping Cart
        </h2>

        <a
            href="index.html"
            class="continue-shopping"
        >
            Continue Shopping
        </a>

    </header>


    <main class="cart-page">

        <div
            id="cartItems"
            class="cart-items"
        >
        </div>


        <div class="cart-summary">

            <h2>Order Summary</h2>

            <div class="summary-row">

                <span>Total Items</span>

                <span id="totalItems">
                    0
                </span>

            </div>


            <div class="summary-row">

                <span>Total Price</span>

                <span id="totalPrice">
                    ₹0
                </span>

            </div>


            <button
                id="checkoutButton"
                class="checkout-button"
            >
                Proceed to Checkout
            </button>

        </div>

    </main>


    <script>

        let cart = JSON.parse(
            localStorage.getItem("cart")
        ) || [];


        const cartItems =
            document.getElementById(
                "cartItems"
            );

        const totalItems =
            document.getElementById(
                "totalItems"
            );

        const totalPrice =
            document.getElementById(
                "totalPrice"
            );

        const checkoutButton =
            document.getElementById(
                "checkoutButton"
            );


        function saveCart() {

            localStorage.setItem(
                "cart",
                JSON.stringify(cart)
            );

        }


        function formatPrice(price) {

            return "₹" +
                price.toLocaleString("en-IN");

        }


        function displayCart() {

            cartItems.innerHTML = "";


            if (cart.length === 0) {

                cartItems.innerHTML = `

                    <div class="empty-cart">

                        <h2>
                            Your cart is empty
                        </h2>

                        <p>
                            Add products from the homepage.
                        </p>

                        <a href="index.html">
                            Go Shopping
                        </a>

                    </div>

                `;

                totalItems.textContent = "0";

                totalPrice.textContent = "₹0";

                checkoutButton.disabled = true;

                return;

            }


            checkoutButton.disabled = false;


            let itemCount = 0;

            let priceTotal = 0;


            cart.forEach(function(item) {

                itemCount += item.quantity;

                priceTotal +=
                    item.price * item.quantity;


                const cartItem =
                    document.createElement("div");


                cartItem.className =
                    "cart-item";


                cartItem.innerHTML = `

                    <img
                        src="${item.image}"
                        alt="${item.name}"
                    >

                    <div class="cart-item-details">

                        <h3>
                            ${item.name}
                        </h3>

                        <p class="cart-item-price">

                            ${formatPrice(
                                item.price
                            )}

                        </p>

                        <p class="delivery">
                            In Stock
                        </p>

                        <div class="quantity-controls">

                            <button
                                onclick="decreaseQuantity(
                                    '${item.id}'
                                )"
                            >
                                −
                            </button>

                            <span>
                                ${item.quantity}
                            </span>

                            <button
                                onclick="increaseQuantity(
                                    '${item.id}'
                                )"
                            >
                                +
                            </button>

                        </div>

                        <button
                            class="remove-button"
                            onclick="removeProduct(
                                '${item.id}'
                            )"
                        >
                            Remove
                        </button>

                    </div>

                    <div class="item-total">

                        ${formatPrice(
                            item.price *
                            item.quantity
                        )}

                    </div>

                `;


                cartItems.appendChild(
                    cartItem
                );

            });


            totalItems.textContent =
                itemCount;


            totalPrice.textContent =
                formatPrice(priceTotal);

        }


        function increaseQuantity(id) {

            const product =
                cart.find(function(item) {

                    return item.id === id;

                });


            if (product) {

                product.quantity++;

            }


            saveCart();

            displayCart();

        }


        function decreaseQuantity(id) {

            const product =
                cart.find(function(item) {

                    return item.id === id;

                });


            if (!product) {

                return;

            }


            if (product.quantity > 1) {

                product.quantity--;

            } else {

                cart = cart.filter(
                    function(item) {

                        return item.id !== id;

                    }
                );

            }


            saveCart();

            displayCart();

        }


        function removeProduct(id) {

            cart = cart.filter(
                function(item) {

                    return item.id !== id;

                }
            );


            saveCart();

            displayCart();

        }


checkoutButton.addEventListener(
    "click",
    function() {

        if (cart.length === 0) {
            return;
        }


        const loggedInUser =
            JSON.parse(
                localStorage.getItem(
                    "loggedInUser"
                )
            );


        if (!loggedInUser) {

            alert(
                "Please login before checkout."
            );

            window.location.href =
                "login.html";

            return;

        }


        window.location.href =
            "checkout.html";

    }
);

        displayCart();

    </script>

</body>
</html>
