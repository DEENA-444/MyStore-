<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Login - MyStore</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <header class="navbar">

        <a href="index.html" class="logo-link">
            MyStore
        </a>

    </header>


    <main class="auth-page">

        <div class="auth-box">

            <h1>Login</h1>

            <form id="loginForm">

                <label for="loginEmail">
                    Email
                </label>

                <input
                    type="email"
                    id="loginEmail"
                    placeholder="Enter your email"
                    required
                >


                <label for="loginPassword">
                    Password
                </label>

                <input
                    type="password"
                    id="loginPassword"
                    placeholder="Enter your password"
                    required
                >


                <p id="loginError" class="form-error"></p>


                <button
                    type="submit"
                    class="auth-button"
                >
                    Login
                </button>

            </form>


            <p class="auth-switch">

                New customer?

                <a href="signup.html">
                    Create an account
                </a>

            </p>

        </div>

    </main>


    <script>

        const loginForm =
            document.getElementById("loginForm");

        const loginError =
            document.getElementById("loginError");


        loginForm.addEventListener(
            "submit",
            function(event) {

                event.preventDefault();

                loginError.textContent = "";


                const email =
                    document
                        .getElementById("loginEmail")
                        .value
                        .trim()
                        .toLowerCase();

                const password =
                    document
                        .getElementById("loginPassword")
                        .value;


                const users = JSON.parse(
                    localStorage.getItem("users")
                ) || [];


                const user =
                    users.find(function(savedUser) {

                        return (
                            savedUser.email === email &&
                            savedUser.password === password
                        );

                    });


                if (!user) {

                    loginError.textContent =
                        "Incorrect email or password.";

                    return;

                }


                const loggedInUser = {

                    id: user.id,

                    name: user.name,

                    email: user.email,

                    phone: user.phone

                };


                localStorage.setItem(
                    "loggedInUser",
                    JSON.stringify(loggedInUser)
                );


                window.location.href =
                    "index.html";

            }
        );

    </script>

</body>
</html>
